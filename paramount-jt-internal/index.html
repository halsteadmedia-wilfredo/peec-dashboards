  th { color:#6b7280; font-weight:600; background:#fafbfc; }
  tr:last-child td { border-bottom:none; }
  tfoot td { font-weight:700; background:#fafbfc; }
  .muted td { color:#9aa1ac; }
  #loading { padding:40px; text-align:center; color:#6b7280; }
  .err { color:#b42318; }
  .foot { color:#9aa1ac; font-size:11px; text-align:center; margin-top:14px; }
  .caption { font-size:12px; color:#6b7280; line-height:1.6; padding:12px 16px; background:#f7fafc; border-radius:8px; margin-bottom:14px; border-left:3px solid #4a6cf7; }
  .caption strong { color:#1f2a44; }

<body>
<div class="wrap">
  <div id="loading">Loading…</div>
  <div id="dash" style="display:none">
    <div class="header-row">
      <h1>Referral Source Performance <span id="client" style="color:#6b7280;font-weight:400"></span></h1>
      <div class="controls">
        <label for="period-select">Period</label>
        <select id="period-select" onchange="rerender()"></select>
      </div>
    </div>
    <div class="sub" id="period"></div>
    
    <div id="notes"></div>
    <div class="kpis" id="kpis"></div>
    <div class="card">
      <h3>By Lead Source</h3>
      <table>
        <thead><tr>
          <th>Source</th><th>Leads</th><th>Open Jobs</th><th>Open Invoices</th><th>Approved Orders</th><th>Collected</th>
        </tr></thead>
        <tbody id="rows"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
    <div class="foot">JobTread referral-source data · refreshed periodically</div>
  </div>
</div>
<script>
  
  
  if (window.__DASH_DATA__) { render(window.__DASH_DATA__); }
  else if (window.__JT_DATA__) { render(window.__JT_DATA__); }
  else if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run.withSuccessHandler(render).withFailureHandler(function (e) {
      document.getElementById('loading').innerHTML = '<span class="err">Failed to load: ' + (e && e.message ? e.message : e) + '</span>';
    }).getDashboardData();
  } else {
    document.getElementById('loading').innerHTML = '<span class="err">Dashboard data missing — publisher inject failed.</span>';
  }

  function renderNotes(notes) {
    var c = document.getElementById('notes');
    if (!notes || !notes.length) { c.innerHTML = ''; return; }
    c.innerHTML = notes.map(function (n) {
      var accent = n.accent === 'warn' ? 'border-left-color:#ed8936;background:#fffaf0;'
                 : n.accent === 'muted' ? 'border-left-color:#a0aec0;' : '';
      var label = n.label ? '<strong>' + escHtml(n.label) + '</strong> ' : '';
      return '<div class="caption" style="' + accent + '">' + label + mdBold(escHtml(n.text)) + '</div>';
    }).join('');
  }
  function escHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function mdBold(s) { return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }

  function money(n) { return '$' + (Number(n) || 0).toLocaleString(undefined, { maximumFractionDigits: 0 }); }
  function num(n) { return (Number(n) || 0).toLocaleString(); }
  function cell(v, isMoney) { return v ? (isMoney ? money(v) : num(v)) : '<span style="color:#cbd0d6">—</span>'; }

  var DATA = null;   

  function render(data) {
    if (!data || data.error) { document.getElementById('loading').innerHTML = '<span class="err">No data</span>'; return; }
    DATA = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    document.getElementById('client').textContent = '— ' + data.clientName;
    renderNotes(data.notes || []);

    
    var sel = document.getElementById('period-select');
    var yr = String(new Date().getFullYear());
    var opts = ['<option value="YTD">Year to Date (' + yr + ')</option>'];
    (data.months || []).slice().reverse().forEach(function (m) {
      opts.push('<option value="' + m + '">' + monthLabel(m) + '</option>');
    });
    sel.innerHTML = opts.join('');

    rerender();
  }

  function rerender() {
    if (!DATA) return;
    var period = document.getElementById('period-select').value;
    var months = monthsInScope(period);
    document.getElementById('period').textContent = period === 'YTD' ? ('Year to Date (' + new Date().getFullYear() + ')') : monthLabel(period);

    
    var perSource = {};
    (DATA.months || []).forEach(function (_) {});   
    Object.keys(DATA.cells || {}).forEach(function (key) {
      var parts = key.split('|'), src = parts[0], m = parts[1];
      if (months.indexOf(m) < 0) return;
      var c = DATA.cells[key];
      if (!perSource[src]) perSource[src] = { source: src, leads: 0, openJobs: 0, openInvoices: 0, approved: 0, collected: 0 };
      perSource[src].leads += c.leads; perSource[src].openJobs += c.openJobs;
      perSource[src].openInvoices += c.openInvoices; perSource[src].approved += c.approved; perSource[src].collected += c.collected;
    });

    var rows = Object.keys(perSource).map(function (k) { return perSource[k]; })
      .sort(function (a, b) { return b.collected - a.collected || b.leads - a.leads; })
      .map(function (r) { return Object.assign({}, r, { source: r.source === 'No Value' ? 'Unattributed' : r.source }); });

    var t = rows.reduce(function (s, r) {
      s.leads += r.leads; s.openJobs += r.openJobs; s.openInvoices += r.openInvoices;
      s.approved += r.approved; s.collected += r.collected; return s;
    }, { leads: 0, openJobs: 0, openInvoices: 0, approved: 0, collected: 0 });

    document.getElementById('kpis').innerHTML = [
      ['Total Leads', num(t.leads)],
      ['Open Jobs', num(t.openJobs)],
      ['Approved Orders', money(t.approved)],
      ['Collected', money(t.collected)]
    ].map(function (k) { return '<div class="kpi"><div class="label">' + k[0] + '</div><div class="val">' + k[1] + '</div></div>'; }).join('');

    document.getElementById('rows').innerHTML = rows.map(function (r) {
      var dim = (r.leads === 0) ? ' class="muted"' : '';
      return '<tr' + dim + '><td>' + r.source + '</td><td>' + num(r.leads) + '</td><td>' + num(r.openJobs) +
        '</td><td>' + cell(r.openInvoices, true) + '</td><td>' + cell(r.approved, true) + '</td><td>' + cell(r.collected, true) + '</td></tr>';
    }).join('') || '<tr><td colspan="6" style="text-align:center;color:#9aa1ac;padding:24px;">No data for this period.</td></tr>';

    document.getElementById('tfoot').innerHTML = '<tr><td>Total</td><td>' + num(t.leads) + '</td><td>' + num(t.openJobs) +
      '</td><td>' + money(t.openInvoices) + '</td><td>' + money(t.approved) + '</td><td>' + money(t.collected) + '</td></tr>';
  }

  function monthsInScope(period) {
    if (period !== 'YTD') return [period];
    var yr = String(new Date().getFullYear()) + '-';
    return (DATA.months || []).filter(function (m) { return m.indexOf(yr) === 0; });
  }
  function monthLabel(m) {
    var mm = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var p = String(m).split('-'); return mm[parseInt(p[1], 10) - 1] + " '" + p[0].slice(2);
  }
</script>
